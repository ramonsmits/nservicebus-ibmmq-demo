* =============================================================================
* IBM MQ configuration for ibmmq-bridge-demo
* Production-like per-service permissions with least privilege
* =============================================================================

* -----------------------------------------------------------------------------
* Dead letter queue
* -----------------------------------------------------------------------------
ALTER QMGR DEADQ('SYSTEM.DEAD.LETTER.QUEUE')
DEFINE QLOCAL('SYSTEM.DEAD.LETTER.QUEUE') REPLACE MAXDEPTH(999999999) DEFPSIST(YES)

* -----------------------------------------------------------------------------
* Channels
*   ADMIN.SVRCONN — web console and admin tools (maps admin → mqm)
*   APP.SVRCONN   — application connections (uses client-supplied identity)
*
* MQ_DEV=false means no dev defaults — we define everything ourselves.
* mqsimpleauth is not loaded, so auth uses standard OS module (amqzfu).
* With CHCKCLNT(OPTIONAL), passwords are never validated — necessary
* because rootless podman's nosuid mounts prevent MQ's PAM auth.
* -----------------------------------------------------------------------------
DEFINE CHANNEL('ADMIN.SVRCONN') CHLTYPE(SVRCONN) REPLACE
DEFINE CHANNEL('APP.SVRCONN')   CHLTYPE(SVRCONN) REPLACE

* TCP listener — disable the system listener to avoid port conflict on 1414
ALTER  LISTENER('SYSTEM.LISTENER.TCP.1')  TRPTYPE(TCP)            CONTROL(MANUAL)
DEFINE LISTENER('TCP.LISTENER')           TRPTYPE(TCP) PORT(1414) CONTROL(QMGR)   REPLACE

* -----------------------------------------------------------------------------
* Channel authentication records
*   Back-stop: block all channels by default
*   Then open ADMIN and APP channels to the right users
* -----------------------------------------------------------------------------
SET CHLAUTH('*')              TYPE(ADDRESSMAP)  ADDRESS('*')            USERSRC(NOACCESS)           DESCR('Back-stop rule')                    ACTION(REPLACE)
SET CHLAUTH('ADMIN.SVRCONN')  TYPE(ADDRESSMAP)  ADDRESS('*')            USERSRC(MAP) MCAUSER('mqm') DESCR('Admin channel — all connections get mqm') ACTION(REPLACE)
SET CHLAUTH('ADMIN.SVRCONN')  TYPE(BLOCKUSER)   USERLIST('nobody')                                                                             ACTION(REPLACE)
SET CHLAUTH('ADMIN.SVRCONN')  TYPE(USERMAP)     CLNTUSER('admin')       USERSRC(MAP) MCAUSER('mqm') DESCR('Map admin to mqm')                  ACTION(REPLACE)
SET CHLAUTH('APP.SVRCONN')    TYPE(ADDRESSMAP)  ADDRESS('*')            USERSRC(CHANNEL)            DESCR('App channel — use client identity') ACTION(REPLACE)
SET CHLAUTH('APP.SVRCONN')    TYPE(BLOCKUSER)   USERLIST('admin','mqm')                                                                        ACTION(REPLACE)

* -----------------------------------------------------------------------------
* Connection authentication
*   ADOPTCTX(YES) adopts the MQCSP user ID as the connection identity,
*   enabling per-service authorization when clients supply a user via MQCSP.
*   CHCKCLNT(REQDADM) only requires passwords for admin users.
*   AUTHENMD(PAM) uses /etc/pam.d/ibmmq which is configured with pam_permit
*   (accept all) — necessary because rootless podman ignores suid bits,
*   preventing the default OS auth module from working.
* -----------------------------------------------------------------------------
DEFINE AUTHINFO('PERMIT.MQCSP') AUTHTYPE(IDPWOS) CHCKCLNT(REQDADM) CHCKLOCL(OPTIONAL) ADOPTCTX(YES) AUTHENMD(PAM) REPLACE
ALTER QMGR CONNAUTH('PERMIT.MQCSP')
REFRESH SECURITY TYPE(CONNAUTH)

* -----------------------------------------------------------------------------
* Endpoint queues
* -----------------------------------------------------------------------------
DEFINE QLOCAL('Acme.Sales')                REPLACE MAXDEPTH(999999999) DEFPSIST(YES)
DEFINE QLOCAL('Acme.Billing')              REPLACE MAXDEPTH(999999999) DEFPSIST(YES)
DEFINE QLOCAL('Acme.Dashboard')            REPLACE MAXDEPTH(999999999) DEFPSIST(YES)
DEFINE QLOCAL('Acme.Sender')               REPLACE MAXDEPTH(999999999) DEFPSIST(YES)
DEFINE QLOCAL('Acme.Shipping')             REPLACE MAXDEPTH(999999999) DEFPSIST(YES)
DEFINE QLOCAL('Acme.LegacySender')        REPLACE MAXDEPTH(999999999) DEFPSIST(YES)

* -----------------------------------------------------------------------------
* Infrastructure queues (ServiceControl, monitoring, audit, error)
* -----------------------------------------------------------------------------
DEFINE QLOCAL('audit')                     REPLACE MAXDEPTH(999999999) DEFPSIST(YES)
DEFINE QLOCAL('error')                     REPLACE MAXDEPTH(999999999) DEFPSIST(YES)
DEFINE QLOCAL('Particular.ServiceControl')       REPLACE MAXDEPTH(999999999) DEFPSIST(YES)
DEFINE QLOCAL('Particular.ServiceControl.Audit') REPLACE MAXDEPTH(999999999) DEFPSIST(YES)
DEFINE QLOCAL('Particular.Monitoring')           REPLACE MAXDEPTH(999999999) DEFPSIST(YES)
DEFINE QLOCAL('ServiceControl.ThroughputData')   REPLACE MAXDEPTH(999999999) DEFPSIST(YES)

* -----------------------------------------------------------------------------
* Event topics (pre-created — app users don't have PCF authority to create these)
*
* Topic naming follows NServiceBus.Transport.IbmMq conventions:
*   Topic name:   DEV.{NAMESPACE}.{CLASSNAME}  (upper-cased, dot-separated)
*   Topic string: dev/{namespace}.{classname}/  (lower-cased, slash-separated)
*
* Pub/sub flow on IBM MQ side:
*   OrderPlaced  — published by sales, subscribed by billing + bridge
*   OrderShipped — published by bridge (from RabbitMQ), subscribed by sales + billing + dashboard
* -----------------------------------------------------------------------------
DEFINE TOPIC('DEV.ACME.ORDERPLACED')  TOPICSTR('dev/acme.orderplaced/')  REPLACE
DEFINE TOPIC('DEV.ACME.ORDERSHIPPED') TOPICSTR('dev/acme.ordershipped/') REPLACE

* -----------------------------------------------------------------------------
* Benchmark queues (mqbench tool)
* -----------------------------------------------------------------------------
DEFINE QLOCAL('bench.a')                  REPLACE MAXDEPTH(999999999) DEFPSIST(NO)
DEFINE QLOCAL('bench.b')                  REPLACE MAXDEPTH(999999999) DEFPSIST(NO)

* =============================================================================
* Per-user authorization records (least privilege)
* =============================================================================

* -----------------------------------------------------------------------------
* Queue manager — all app users need CONNECT + INQ
* -----------------------------------------------------------------------------
SET AUTHREC OBJTYPE(QMGR) GROUP('mqclient') AUTHADD(CONNECT,INQ,DSP,CRT)
SET AUTHREC PROFILE('SYSTEM.**')                   OBJTYPE(QUEUE) GROUP('mqclient') AUTHADD(GET,PUT,INQ,DSP,BROWSE)
SET AUTHREC PROFILE('SYSTEM.BASE.TOPIC')           OBJTYPE(TOPIC) GROUP('mqclient') AUTHADD(PUB,SUB)

* -----------------------------------------------------------------------------
* sales — owns Acme.Sales, can PUT to shipping/billing/dashboard + infra
*         publishes OrderPlaced, subscribes to OrderShipped
* -----------------------------------------------------------------------------
SET AUTHREC PROFILE('audit')                     OBJTYPE(QUEUE) PRINCIPAL('sales') AUTHADD(PUT,CHG,DSP)
SET AUTHREC PROFILE('error')                     OBJTYPE(QUEUE) PRINCIPAL('sales') AUTHADD(PUT,CHG,DSP)
SET AUTHREC PROFILE('Acme.Billing')              OBJTYPE(QUEUE) PRINCIPAL('sales') AUTHADD(PUT,CHG,DSP)
SET AUTHREC PROFILE('Acme.Dashboard')            OBJTYPE(QUEUE) PRINCIPAL('sales') AUTHADD(PUT,CHG,DSP)
SET AUTHREC PROFILE('Acme.Sales')                OBJTYPE(QUEUE) PRINCIPAL('sales') AUTHADD(GET,PUT,INQ,BROWSE,CHG,DSP)
SET AUTHREC PROFILE('Acme.Sales.**')             OBJTYPE(QUEUE) PRINCIPAL('sales') AUTHADD(GET,PUT,INQ,BROWSE,CHG,DSP,CRT)
SET AUTHREC PROFILE('Acme.Shipping')             OBJTYPE(QUEUE) PRINCIPAL('sales') AUTHADD(PUT,CHG,DSP)
SET AUTHREC PROFILE('Acme.LegacySender')         OBJTYPE(QUEUE) PRINCIPAL('sales') AUTHADD(PUT,CHG,DSP)
SET AUTHREC PROFILE('Particular.ServiceControl') OBJTYPE(QUEUE) PRINCIPAL('sales') AUTHADD(PUT,CHG,DSP)
SET AUTHREC PROFILE('Particular.Monitoring')     OBJTYPE(QUEUE) PRINCIPAL('sales') AUTHADD(PUT,CHG,DSP)
SET AUTHREC PROFILE('DEV.ACME.ORDERPLACED')      OBJTYPE(TOPIC) PRINCIPAL('sales') AUTHADD(PUB)
SET AUTHREC PROFILE('DEV.ACME.ORDERSHIPPED')     OBJTYPE(TOPIC) PRINCIPAL('sales') AUTHADD(SUB)

